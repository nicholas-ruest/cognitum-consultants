name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (check, clippy, test)
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu-latest runners ship Docker Engine preinstalled
    # and reachable via the default socket with no extra setup (see
    # actions/runner-images' Ubuntu 24.04 software manifest) — no
    # docker/setup step is added here. `cargo test --workspace` below
    # includes `persistence`'s testcontainers-modules-based integration
    # test (ADR-010/ADR-013 layer 3), which launches a real, throwaway
    # Postgres container via that preinstalled Docker.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # sqlx's compile-time `query!`/`query_as!` macros normally need a
      # reachable DATABASE_URL or a committed `.sqlx/` offline cache
      # (ADR-010; see crates/persistence/README.md). Neither is set up here
      # because zero such macro invocations exist yet (no aggregate tables
      # as of U09) — nothing for `check`/`clippy` to verify against a
      # schema. Revisit (set SQLX_OFFLINE=true and cache `.sqlx/`) once
      # U20 adds the first real query.
      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

  frontend:
    name: Frontend (build, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

      - name: npm run lint
        run: npm run lint

      - name: npm run test (Vitest)
        run: npm run test

      # Playwright e2e (layer 5, ADR-013 §6) is intentionally NOT run here yet.
      # TODO(U27): wire a Playwright CI job once the Sales lead-conflict e2e
      # flow lands — it needs a built/served app (frontend + BFF, or mocked
      # Nexus) rather than just `npm run dev`, which this job does not stand up.
