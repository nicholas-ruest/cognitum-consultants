name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (check, clippy, test)
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu-latest runners ship Docker Engine preinstalled
    # and reachable via the default socket with no extra setup (see
    # actions/runner-images' Ubuntu 24.04 software manifest) — no
    # docker/setup step is added here. `cargo test --workspace` below
    # includes `persistence`'s testcontainers-modules-based integration
    # test (ADR-010/ADR-013 layer 3), which launches a real, throwaway
    # Postgres container via that preinstalled Docker.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # sqlx's compile-time `query!`/`query_as!` macros normally need a
      # reachable DATABASE_URL or a committed `.sqlx/` offline cache
      # (ADR-010; see crates/persistence/README.md). Neither is set up here
      # because zero such macro invocations exist yet (no aggregate tables
      # as of U09) — nothing for `check`/`clippy` to verify against a
      # schema. Revisit (set SQLX_OFFLINE=true and cache `.sqlx/`) once
      # U20 adds the first real query.
      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

  frontend:
    name: Frontend (build, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      # PROMPT-42/ADR-017: npm ci must run from the workspace root (where
      # package-lock.json now lives) so it installs and links
      # @cognitum/design-system and @cognitum/dashboard-components
      # (packages/*) as well as frontend/ — running it from within
      # frontend/ would not see the root lockfile.
      - name: npm ci
        working-directory: .
        run: npm ci

      - name: npm run build
        run: npm run build

      - name: npm run lint
        run: npm run lint

      - name: npm run test (Vitest)
        run: npm run test

  # PROMPT-27: Playwright e2e (ADR-013 layer 5, canonical smoke test).
  # `needs: [rust, frontend]` both expresses the real dependency (this job
  # builds the same Rust workspace and frontend package those jobs already
  # validated) and gives this heavier, real-stack job the "slower cadence"
  # ADR-013 §6 calls for — it only starts once the fast unit-level gates
  # have already passed, rather than racing them.
  e2e:
    name: E2E (Playwright, full stack)
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    # See the `rust` job's comment: ubuntu-latest ships Docker Engine
    # preinstalled and reachable with no extra setup. This job's
    # `playwright.config.ts` globalSetup (`frontend/e2e/support/global-setup.ts`)
    # uses that Docker daemon directly (`docker run postgres:17-alpine`) to
    # bring up a throwaway, migrated Postgres instance — the same "real
    # Postgres, no manual setup" pattern the `rust` job's testcontainers-based
    # tests already rely on, just invoked from Node instead of Rust.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      # See the `frontend` job's identical step comment: npm ci must run
      # from the workspace root's package-lock.json (PROMPT-42/ADR-017).
      - name: npm ci
        run: npm ci

      - name: Install Playwright browsers (chromium)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # Drives the full real stack per-spec via `playwright.config.ts`'s
      # `globalSetup`: real Vite-served frontend (the pre-existing
      # `webServer`), real `bff-api` (built here, from this checkout), real
      # (throwaway, migrated) Postgres, with Nexus mocked at the HTTP
      # boundary (`frontend/e2e/support/mock-nexus-server.ts`). `CI=true` is
      # set by GitHub Actions automatically, which `playwright.config.ts`'s
      # `webServer.reuseExistingServer` already keys off of.
      - name: npx playwright test (e2e)
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # PROMPT-28 / ADR-014: builds the multi-stage `Dockerfile` image, runs
  # database migrations against a provisioned Postgres as an explicit
  # pre-rollout step (ADR-014, ADR-010 — not an implicit side effect of
  # application startup), then "deploys" the built image to a local Docker
  # environment and smoke-tests it as the CI-verifiable proxy for a real
  # deploy — no real target (cloud/orchestrator) is chosen yet, see
  # `docs/deployment.md`. `needs: [rust, frontend]` mirrors the `e2e` job:
  # this is the heaviest job in the pipeline, so it only starts once the
  # fast unit-level gates have already passed.
  deploy:
    name: Deploy (build image, migrate, run, smoke-test)
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Task 1: multi-stage build (cargo-chef Rust layer + Vite frontend
      # layer + minimal runtime layer) — see Dockerfile / docs/deployment.md.
      - name: docker build
        run: docker build -t cognitum-consultants:ci .

      # Same "throwaway `docker run postgres:17-alpine`, migrate via `psql`
      # inside the container" pattern the `e2e` job's
      # `frontend/e2e/support/test-stack.ts` already uses, so this doesn't
      # introduce a second, divergent way of standing up a migrated
      # Postgres in CI.
      - name: Start Postgres
        run: |
          docker run -d --name deploy-postgres -p 5432:5432 \
            -e POSTGRES_PASSWORD=postgres postgres:17-alpine
          for _ in $(seq 1 60); do
            docker exec deploy-postgres pg_isready -U postgres && break
            sleep 1
          done

      # Explicit pre-rollout migration step (ADR-014), independent of
      # whether the image being deployed happens to run them itself.
      - name: Run database migrations
        run: |
          for f in crates/persistence/migrations/*.up.sql; do
            echo "Applying $f"
            docker exec -i deploy-postgres psql -v ON_ERROR_STOP=1 -U postgres -d postgres < "$f"
          done

      # "Deploy" to a local Docker environment (Task 5's CI-verifiable proxy
      # for a real target, see docs/deployment.md). `--network host` lets
      # the app container reach the Postgres container's host-published
      # port directly — both containers, and this smoke-test step, all run
      # against `127.0.0.1` as a result.
      - name: Run the built image
        run: |
          docker run -d --name deploy-app --network host \
            -e DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/postgres \
            -e APP_ENV=dev \
            cognitum-consultants:ci

      # Task 3/1 validation: readiness (DB-backed), the SPA served at `/`,
      # and `/api/*` still answering correctly (401 with no session cookie)
      # from the *same* image that serves the SPA — this is ADR-006's
      # "single image serves both" claim, verified for real rather than by
      # code review.
      - name: Smoke-test the running container
        run: |
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/readyz >/dev/null && break
            sleep 1
          done

          echo "-- GET /healthz --"
          curl -sf http://127.0.0.1:3000/healthz

          echo "-- GET /readyz --"
          curl -sf http://127.0.0.1:3000/readyz

          echo "-- GET / (SPA index.html) --"
          curl -sf http://127.0.0.1:3000/ | grep -q '<div id="root">'

          echo "-- GET /api/session with no cookie (expect 401) --"
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/api/session)
          test "$status" = "401"

      # Task 4 validation: `docker stop` sends SIGTERM; a hung/forcibly
      # killed shutdown would make this step itself run long (Docker falls
      # back to SIGKILL after its default 10s grace period) rather than
      # just fail outright, so this also catches a regression there.
      - name: Stop the container (graceful shutdown)
        run: docker stop deploy-app

      - name: Show app logs
        if: always()
        run: docker logs deploy-app

      - name: Tear down
        if: always()
        run: docker rm -f deploy-app deploy-postgres
